            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
        }

        .page {
            display: none;

            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 封面页 */
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-emoji {
            font-size: 60px;
            margin-bottom: 10px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }

        }

        .logo h1 {
            font-size: 28px;
            color: #5D4E6D;
            margin-bottom: 5px;
        }

        .logo p {
            color: #888;
            font-size: 13px;
        }

            background: linear-gradient(135deg, #FFF5F8 0%, #F8F0FF 100%);
            padding: 15px;
            border-radius: 14px;
            margin: 15px 0;
            text-align: center;
        }

        .intro-text p {
            color: #666;
            line-height: 1.7;
            font-size: 14px;
        }

        .pet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }

        .test-type-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .test-type-tab {
            flex: 1;
            padding: 10px 8px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            font-size: 13px;
            color: #666;
        }

        .test-type-tab:hover {
            border-color: #DDA0DD;
        }

        .test-type-tab.active {
            border-color: #DDA0DD;
            background: linear-gradient(135deg, #FFF5F8 0%, #F8F0FF 100%);
            color: #5D4E6D;
            font-weight: 600;
        }

        .test-type-tab .emoji {
            display: block;
            font-size: 22px;
            margin-bottom: 4px;
        }

        .pet-card {

            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .pet-card:hover {
            border-color: #DDA0DD;
            transform: translateY(-2px);
        }

        .pet-card.selected {
            border-color: #DDA0DD;
            background: linear-gradient(135deg, #FFF5F8 0%, #F8F0FF 100%);

        .pet-card .emoji {
            font-size: 40px;

        }

        .pet-card .name {
            font-size: 16px;
            font-weight: 600;
            color: #5D4E6D;
        }

        .start-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FFB6C1 0%, #DDA0DD 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 15px;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(221,160,221,0.4);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .footer-text {
            text-align: center;
            color: #aaa;
            font-size: 12px;
            margin-top: 15px;
        }

        /* 问题页 */
        .progress-bar {
            height: 5px;
            background: #f0f0f0;
            border-radius: 3px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFB6C1, #DDA0DD);
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .progress-text {
            text-align: center;
            color: #DDA0DD;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 17px;
            color: #333;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 14px 16px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .option:hover {
            border-color: #DDA0DD;
            background: #FFF8FF;
        }

        .option.selected {
            border-color: #DDA0DD;
            background: linear-gradient(135deg, #FFF5F8 0%, #F8F0FF 100%);
        }

        .option-text {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }

        .option.selected .option-text {
            color: #5D4E6D;
            font-weight: 500;
        }

        /* 结果页 */
        .result-header {
            text-align: center;
            padding: 10px 0 15px;
        }

        .result-emoji {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .result-type {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFB6C1, #DDA0DD);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .result-subtitle {
            font-size: 13px;
            color: #999;
        }

        .result-score {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .score-item {
            text-align: center;
            padding: 8px 12px;
            background: #f8f8f8;
            border-radius: 10px;
        }

        .score-label {
            font-size: 11px;
            color: #999;
            margin-bottom: 3px;
        }

        .score-value {
            font-size: 13px;
            font-weight: 600;
            color: #5D4E6D;
        }

        .result-desc {

            padding: 16px;
            border-radius: 14px;
            margin: 12px 0;
        }

        .result-desc h3 {
            font-size: 14px;
            color: #DDA0DD;
            margin-bottom: 8px;
            display: flex;
            align-items: center;

        .result-desc p {
            font-size: 13px;
            color: #555;
            line-height: 1.7;
        }

        .action-btns {

            flex-direction: column;
            gap: 10px;

        }

        .share-btn {

            background: linear-gradient(135deg, #FFB6C1 0%, #DDA0DD 100%);

            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;

            color: #666;
            border: none;
            border-radius: 50px;
            font-size: 15px;

            .page { padding: 18px 14px; border-radius: 20px; }
            .logo h1 { font-size: 24px; }

        }
    </style>
</head>

                    'IACS': { type: '社恐小可爱', subtitle: '害羞内敛，需要耐心', desc: '你家爬宠是个害羞的小家伙！对外界反应敏感，容易紧张。需要主人耐心地慢慢接近。', tips: '互动时动作要慢。保持环境稳定，给它安全感。' },
                    'IQDS': { type: '超级跟屁虫', subtitle: '对你的存在感很敏感', desc: '你家爬宠可能比你想象的更依赖你！虽然它们看起来冷冷淡淡，但其实对你的气味和存在感很敏感。', tips: '保持固定的照顾时间让它安心。互动时保持环境稳定。' },
                    'IQIS': { type: '躺平之王', subtitle: '爬宠界躺平代言人', desc: '你家爬宠是爬宠界的躺平代言人！能不动就不动，能少吃就少吃。对外界刺激反应迟钝，最大的爱好就是睡觉和发呆。', tips: '定期检查它的体重和状态，只要健康就没问题。保持温湿度适宜。' },
                    'IQIA': { type: '独行侠', subtitle: '独来独往，自由万岁', desc: '你家爬宠是个彻底的独行侠！不需要社交，不需要依赖，就喜欢自己待着。有自己完整的小世界。', tips: '尊重它的独立性。准备好食物和环境就够了。' }
                }
            }
        };

        // 养宠推荐数据
        const recommendData = {
            questions: [
                { question: '你的日常作息比较？', options: [{ text: '规律稳定，朝九晚五', scores: { dog: 5 } }, { text: '不太规律，经常加班或出差', scores: { reptile: 3, bird: 2, cat: 2 } }] },
                { question: '每天能花在宠物上的时间大概？', options: [{ text: '2小时以上，愿意陪玩互动', scores: { dog: 5, cat: 3 } }, { text: '1小时以内，比较忙', scores: { reptile: 5, bird: 3, cat: 2 } }] },
                { question: '你住的环境面积？', options: [{ text: '80平以上，或有院子', scores: { dog: 5, cat: 2 } }, { text: '80平以下，或合租单间', scores: { reptile: 5, bird: 3, cat: 4 } }] },
                { question: '你更享受哪种互动方式？', options: [{ text: '撸猫撸狗，有温度的肢体接触', scores: { cat: 2, dog: 2 } }, { text: '观赏为主，看它待着就很治愈', scores: { reptile: 1, bird: 1 } }] },
                { question: '下班回家后，你希望宠物会？', options: [{ text: '热情迎接我，治愈一天疲惫', scores: { dog: 1, cat: 1 } }, { text: '各干各的，不需要太多互动', scores: { reptile: 1, bird: 1 } }] },
                { question: '身边有人养宠物时，你会？', options: [{ text: '忍不住上手摸，很想rua', scores: { dog: 1, cat: 1 } }, { text: '远远看看就好，不太敢接触', scores: { reptile: 0, bird: 1 } }] },
                { question: '你对宠物的预期是？', options: [{ text: '亲人、能互动、有反馈', scores: { dog: 1, cat: 1 } }, { text: '安静、不吵、好养活', scores: { reptile: 1, bird: 1 } }] },
                { question: '你能接受宠物可能带来的？', options: [{ text: '掉毛、异味、偶尔搞破坏', scores: { dog: 1, cat: 1 } }, { text: '希望尽可能干净、安静', scores: { reptile: 1, bird: 1 } }] },
                { question: '你之前有过养宠物的经历吗？', options: [{ text: '养过，能照顾好自己', scores: { dog: 1, cat: 1 } }, { text: '没养过，这是第一次', scores: { reptile: 1, bird: 1 } }] },
                { question: '你更喜欢哪种动物？', options: [{ text: '毛茸茸的', scores: { cat: 2, dog: 2 } }, { text: '带羽毛/鳞片/甲壳的', scores: { bird: 1, reptile: 2 } }] }
            ],
            results: {
                cat: {
                    emoji: '🐱',
                    name: '猫咪',
                    type: '适合养猫',
                    subtitle: '独立又治愈的陪伴',
                    desc: '你很适合养一只猫咪！猫咪独立又傲娇，不需要你花太多时间陪伴，但又会在你回家时蹭蹭迎接。它们能治愈你一天的疲惫，又不会占用你太多私人时间。养猫让你享受陪伴的同时，也拥有自己的空间。',
                    tips: '新手推荐英短、美短等温顺品种。记得准备猫砂盆、猫爬架，定期体检和驱虫。猫咪需要的是高质量陪伴，而不是长时间陪伴。'
                },
                dog: {
                    emoji: '🐶',
                    name: '狗狗',
                    type: '适合养狗',
                    subtitle: '热情忠诚的灵魂伴侣',
                    desc: '你天生适合养狗！狗狗是人类最忠诚的朋友，它们热情、粘人、需要陪伴，正好和你喜欢互动的心一拍即合。你有足够的时间和耐心，能给予狗狗需要的运动和关爱。养狗会给你带来无尽的快乐和陪伴。',
                    tips: '根据你的居住环境选择合适体型。大狗需要更多运动空间，小型犬适合城市生活。记得每天遛狗、定期洗澡、做好社会化训练。'
                },
                bird: {
                    emoji: '🐦',
                    name: '小鸟',
                    type: '适合养鸟',
                    subtitle: '会唱歌的快乐源泉',
                    desc: '你很适合养一只小鸟！小鸟们羽毛漂亮、歌声动听，能给你的生活增添无限乐趣。它们不需要太大的空间，但能给你带来美妙的歌声和灵动的陪伴。养鸟让你享受观赏的乐趣，同时也不用花太多时间打理。',
                    tips: '新手推荐虎皮鹦鹉或文鸟，容易饲养。准备好鸟笼、食物、玩具。注意保持环境清洁，避免冷风直吹。'
                },
                reptile: {
                    emoji: '🦎',
                    name: '爬宠',
                    type: '适合养爬宠',
                    subtitle: '独特另类的治愈伙伴',
                    desc: '你很适合养爬宠！蜥蜴、守宫、龟类...这些独特的小家伙安静又省心，不需要每天遛，也不用担心掉毛。它们有着独特的魅力，静静观赏就能治愈心灵。养爬宠让你体验到一种与众不同的陪伴方式。',
                    tips: '新手推荐豹纹守宫或睫角守宫，容易饲养。需要准备专用的饲养箱、温控设备、UVB灯等。学习相关知识后再入手。'
                }
            }
        };

        // 状态
        let currentPet = null;
        let currentQuestion = 0;
        // 计分：记录每个维度的A面选择次数和有效题目数
        let dimStats = {
            social: { aCount: 0, validCount: 0 },      // 社交
            energy: { aCount: 0, validCount: 0 },      // 能量
            attach: { aCount: 0, validCount: 0 },      // 依赖
            smart: { aCount: 0, validCount: 0 }        // 聪明
        };
        let testType = 'personality'; // 'personality' 或 'recommend'
        let recommendScores = { cat: 0, dog: 0, bird: 0, reptile: 0 };

        function selectPet(pet, element) {
            currentPet = pet;
            document.querySelectorAll('.pet-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('startBtn').disabled = false;
        }

        function switchTestType(type, element) {
            testType = type;
            document.querySelectorAll('.test-type-tab').forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');

            const introContent = document.getElementById('introContent');
            const petGrid = document.querySelector('.pet-grid');

            if (type === 'personality') {
                introContent.innerHTML = `
                    就像人类的MBTI一样<br>
                    每只宠物都有独特的性格密码<br>
                    <strong style="color:#DDA0DD">16道题</strong> 揭秘你家主子的真实性格
                `;
                document.querySelector('.logo p').textContent = '测测你家主子的独特性格';
                petGrid.style.display = 'grid';
                document.querySelector('.pet-grid').innerHTML = `
                    <div class="pet-card" onclick="selectPet('cat', this)">
                        <span class="emoji">🐱</span>
                        <span class="name">猫咪</span>
                    </div>
                    <div class="pet-card" onclick="selectPet('dog', this)">
                        <span class="emoji">🐶</span>
                        <span class="name">狗狗</span>
                    </div>
                    <div class="pet-card" onclick="selectPet('bird', this)">
                        <span class="emoji">🐦</span>
                        <span class="name">鸟类</span>
                    </div>
                    <div class="pet-card" onclick="selectPet('reptile', this)">
                        <span class="emoji">🦎</span>
                        <span class="name">爬宠</span>
                    </div>
                `;
                document.querySelector('#page-start p[style*="center"]').textContent = '先选择你家宠物的类型：';
                document.getElementById('startBtn').textContent = '开始测试 →';
            } else {
                introContent.innerHTML = `
                    想养宠物但不知道养什么？<br>
                    根据你的生活方式和偏好<br>
                    <strong style="color:#DDA0DD">10道题</strong> 推荐最适合你的宠物
                `;
                document.querySelector('.logo p').textContent = '帮你找到最合适的宠物';
                petGrid.style.display = 'none';
                document.getElementById('startBtn').textContent = '开始推荐 →';
            }

            // 重置状态
            currentPet = null;
            document.getElementById('startBtn').disabled = testType === 'recommend' ? false : true;
        }

        function startTest() {
            document.getElementById('page-start').classList.remove('active');
            document.getElementById('page-question').classList.add('active');
            currentQuestion = 0;
            // 重置维度统计
            dimStats = {
                social: { aCount: 0, validCount: 0 },
                energy: { aCount: 0, validCount: 0 },
                attach: { aCount: 0, validCount: 0 },
                smart: { aCount: 0, validCount: 0 }
            };
            recommendScores = { cat: 0, dog: 0, bird: 0, reptile: 0 };

            if (testType === 'personality') {
                // 打乱题目顺序
                const data = petData[currentPet];
                data.questions = shuffleArray([...data.questions]);
            }

            showQuestion();
        }

        // 打乱数组顺序
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showQuestion() {
            let q, total;

            if (testType === 'recommend') {
                q = recommendData.questions[currentQuestion];
                total = recommendData.questions.length;
            } else {
                const data = petData[currentPet];
                q = data.questions[currentQuestion];
                total = data.questions.length;
            }

            const progress = ((currentQuestion + 1) / total) * 100;

            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `第 ${currentQuestion + 1}/${total} 题`;
            document.getElementById('questionText').textContent = q.question;

            // 打乱选项顺序
            const shuffledOptions = shuffleArray([...q.options]);

            let optionsHtml;
            if (testType === 'recommend') {
                optionsHtml = shuffledOptions.map((opt, i) => `
                    <div class="option" onclick="selectRecommendOption(${i}, this)">
                        <div class="option-text">${opt.text}</div>
                    </div>
                `).join('');
            } else {
                optionsHtml = shuffledOptions.map((opt, i) => `
                    <div class="option" onclick="selectOption('${opt.value}', this)">
                        <div class="option-text">${opt.text}</div>
                    </div>
                `).join('');
            }

            document.getElementById('options').innerHTML = optionsHtml;
        }

        function selectRecommendOption(index, element) {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');

            const opt = recommendData.questions[currentQuestion].options[index];
            // 加分数
            for (const [pet, score] of Object.entries(opt.scores)) {
                recommendScores[pet] += score;
            }

            setTimeout(() => {
                currentQuestion++;
                const total = recommendData.questions.length;
                if (currentQuestion >= total) {
                    showRecommendResult();
                } else {
                    showQuestion();
                }
            }, 400);
        }

        function selectOption(value, element) {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');

            // 获取当前题目的维度
            const currentQ = petData[currentPet].questions[currentQuestion];
            const dim = currentQ.dim;

            // 根据维度记录统计
            if (dim === '社交模式') {
                dimStats.social.validCount++;
                if (value === 'S_A') dimStats.social.aCount++;
            } else if (dim === '能量水平') {
                dimStats.energy.validCount++;
                if (value === 'E_H') dimStats.energy.aCount++;
            } else if (dim === '依赖程度') {
                dimStats.attach.validCount++;
                if (value === 'D_D') dimStats.attach.aCount++;
            } else if (dim === '聪明程度') {
                dimStats.smart.validCount++;
                if (value === 'C_C') dimStats.smart.aCount++;
            }

            setTimeout(() => {
                currentQuestion++;
                const total = petData[currentPet].questions.length;
                if (currentQuestion >= total) {
                    showResult();
                } else {
                    showQuestion();
                }
            }, 400);
        }

        function showRecommendResult() {
            document.getElementById('page-question').classList.remove('active');
            document.getElementById('page-result').classList.add('active');

            // 找出最高分的宠物类型
            let maxPet = 'cat';
            let maxScore = 0;
            for (const [pet, score] of Object.entries(recommendScores)) {
                if (score > maxScore) {
                    maxScore = score;
                    maxPet = pet;
                }
            }

            const result = recommendData.results[maxPet];

            document.getElementById('resultEmoji').textContent = result.emoji;
            document.getElementById('resultType').textContent = result.type;
            document.getElementById('resultSubtitle').textContent = result.subtitle;
            document.getElementById('resultDesc').textContent = result.desc;
            document.getElementById('resultTips').textContent = result.tips;

            // 显示各类型得分
            const scoreHtml = `
                <div class="score-item"><div class="score-label">🐱 猫咪</div><div class="score-value">${recommendScores.cat}分</div></div>
                <div class="score-item"><div class="score-label">🐶 狗狗</div><div class="score-value">${recommendScores.dog}分</div></div>
                <div class="score-item"><div class="score-label">🐦 鸟类</div><div class="score-value">${recommendScores.bird}分</div></div>
                <div class="score-item"><div class="score-label">🦎 爬宠</div><div class="score-value">${recommendScores.reptile}分</div></div>
            `;
            document.getElementById('resultScore').innerHTML = scoreHtml;
        }

        function showResult() {
            document.getElementById('page-question').classList.remove('active');
            document.getElementById('page-result').classList.add('active');

            // 计算最终分数（按比例）
            const scoreSocial = dimStats.social.validCount > 0
                ? (dimStats.social.aCount / dimStats.social.validCount) * 4 : 0;
            const scoreEnergy = dimStats.energy.validCount > 0
                ? (dimStats.energy.aCount / dimStats.energy.validCount) * 4 : 0;
            const scoreAttach = dimStats.attach.validCount > 0
                ? (dimStats.attach.aCount / dimStats.attach.validCount) * 4 : 0;
            const scoreSmart = dimStats.smart.validCount > 0
                ? (dimStats.smart.aCount / dimStats.smart.validCount) * 4 : 0;

            const data = petData[currentPet];
            
            // 判断各维度高低
            const socialHigh = scoreSocial >= 2;
            const energyHigh = scoreEnergy >= 2;
            const attachHigh = scoreAttach >= 2;
            const smartHigh = scoreSmart >= 2;
            
            // 计算每个维度的得分
            const getDimScore = (high) => high ? 'A' : 'I';
            
            // 生成精确key
            const exactKey = (socialHigh ? 'E' : 'I') + 
                           (energyHigh ? 'A' : 'Q') + 
                           (attachHigh ? 'D' : 'I') + 
                           (smartHigh ? 'C' : 'S');
            
            // 如果精确匹配存在，直接使用
            if (data.personalities[exactKey]) {
                var result = data.personalities[exactKey];
            } else {
                // 智能降级：三步走策略
                
                // 第一步：找出依赖维度匹配的类型
                const attachMatchKeys = Object.keys(data.personalities).filter(key => {
                    return (key[2] === 'D') === attachHigh;
                });
                
                // 第二步：如果有依赖匹配的类型，再从中选社交+能量匹配最好的
                if (attachMatchKeys.length > 0) {
                    let bestMatch = null;
                    let bestScore = -1;
                    
                    for (const key of attachMatchKeys) {
                        let score = 0;
                        // 社交匹配（权重2）
                        if ((key[0] === 'E') === socialHigh) score += 2;
                        // 能量匹配（权重2）
                        if ((key[1] === 'A') === energyHigh) score += 2;
                        // 聪明匹配（权重1）
                        if ((key[3] === 'C') === smartHigh) score += 1;
                        
                        if (score > bestScore) {
                            bestScore = score;
                            bestMatch = key;
                        }
                    }
                    var result = data.personalities[bestMatch];
                } else {
                    // 第三步：如果没有依赖匹配，找社交+能量最好的
                    let bestMatch = null;
                    let bestScore = -1;
                    
                    for (const key of Object.keys(data.personalities)) {
                        let score = 0;
                        if ((key[0] === 'E') === socialHigh) score += 2;
                        if ((key[1] === 'A') === energyHigh) score += 2;
                        if ((key[3] === 'C') === smartHigh) score += 1;
                        
                        if (score > bestScore) {
                            bestScore = score;
                            bestMatch = key;
                        }
                    }
                    var result = data.personalities[bestMatch] || data.personalities['IQIS'];
                }
            }

            document.getElementById('resultEmoji').textContent = data.emoji;
            document.getElementById('resultType').textContent = result.type;
            document.getElementById('resultSubtitle').textContent = result.subtitle;
            document.getElementById('resultDesc').textContent = result.desc;
            document.getElementById('resultTips').textContent = result.tips;

            const scoreHtml = `
                <div class="score-item"><div class="score-label">社交能力</div><div class="score-value">${scoreSocial.toFixed(1)}分</div></div>
                <div class="score-item"><div class="score-label">能量指数</div><div class="score-value">${scoreEnergy.toFixed(1)}分</div></div>
                <div class="score-item"><div class="score-label">依赖程度</div><div class="score-value">${scoreAttach.toFixed(1)}分</div></div>
                <div class="score-item"><div class="score-label">聪明指数</div><div class="score-value">${scoreSmart.toFixed(1)}分</div></div>
            `;
            document.getElementById('resultScore').innerHTML = scoreHtml;
        }

        function shareResult() {
            const resultType = document.getElementById('resultType').textContent;
            const resultSubtitle = document.getElementById('resultSubtitle').textContent;
            let shareText;

            if (testType === 'recommend') {
                shareText = `🏠 测试结果显示：${resultType}！${resultSubtitle}\n\n你想养宠物吗？测测最适合你的宠物是什么！`;
            } else {
                const petName = petData[currentPet].name;
                shareText = `🐾 我的${petName}测出来是「${resultType}」！${resultSubtitle}\n\n来试试PBTI性格测试吧！`;
            }

            if (navigator.share) {
                navigator.share({ title: 'PBTI测试', text: shareText, url: window.location.href });
            } else {
                navigator.clipboard.writeText(shareText).then(() => {
                    alert('结果已复制到剪贴板，快去分享给朋友吧！🐾');
                }).catch(() => {
                    alert('请截图分享结果！🐾');
                });
            }
        }

        function retryTest() {
            document.getElementById('page-result').classList.remove('active');
            document.getElementById('page-start').classList.add('active');
            currentPet = null;
            currentQuestion = 0;
            // 重置维度统计
            dimStats = {
                social: { aCount: 0, validCount: 0 },
                energy: { aCount: 0, validCount: 0 },
                attach: { aCount: 0, validCount: 0 },
                smart: { aCount: 0, validCount: 0 }
            };
            recommendScores = { cat: 0, dog: 0, bird: 0, reptile: 0 };

            // 如果当前是推荐模式，重置UI
            if (testType === 'recommend') {
                document.getElementById('startBtn').disabled = false;
            } else {
                document.querySelectorAll('.pet-card').forEach(card => card.classList.remove('selected'));
                document.getElementById('startBtn').disabled = true;
            }
        }
    </script>
